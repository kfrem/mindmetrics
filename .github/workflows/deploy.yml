name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build — inline fonts for self-contained HTML
        run: python3 build.py

      - name: Replace index.html with self-contained build
        run: cp dist/index.html index.html

      - name: Commit & push built file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "build: inline fonts [skip ci]"
          git push
